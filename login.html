<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - FirmeRO</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-building"></i> FirmeRO
            </a>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Căutare</a>
                <a href="harta.html" class="nav-link">Hartă</a>
                <a href="comparare.html" class="nav-link">Comparare</a>
                <a href="statistici.html" class="nav-link">Statistici</a>
                <div class="auth-links" style="display: flex; gap: 1rem; align-items: center;"></div>
            </div>
        </div>
    </header>

    <main class="container" style="max-width: 400px; margin-top: 4rem;">
        <div class="card" style="padding: 2rem;">
            <h1 style="text-align: center; margin-bottom: 1.5rem; color: var(--primary-color);">Autentificare</h1>
            
            <div id="error-message" style="display: none; color: #dc2626; background: #fee2e2; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.875rem;"></div>

            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email</label>
                    <input type="email" id="email" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
                </div>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Parolă</label>
                    <input type="password" id="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;">
                </div>

                <button type="submit" class="search-btn" id="submit-btn" style="width: 100%; justify-content: center;">
                    <i class="fas fa-sign-in-alt"></i> Intră în cont
                </button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-light);">
                Nu ai cont? <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Creează unul gratuit</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.querySelector('.mobile-menu-btn').addEventListener('click', () => {
            document.querySelector('.nav-links').classList.toggle('active');
        });

        // Redirecționează dacă e deja logat
        if (Auth.isAuthenticated()) {
            window.location.href = 'contul-meu.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btn = document.getElementById('submit-btn');

            try {
                errorDiv.style.display = 'none';
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Se autentifică...';
                
                await Auth.login(email, password);
                window.location.href = 'contul-meu.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Intră în cont';
            }
        });
    </script>
</body>
</html>
