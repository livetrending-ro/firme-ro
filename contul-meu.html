<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contul Meu - FirmeRO</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .favorite-card {
            background: var(--bg-card, #1a1d2e);
            border: 1px solid var(--border, rgba(255,255,255,0.08));
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .favorite-card:hover {
            border-color: rgba(99,102,241,0.3);
            box-shadow: 0 4px 24px rgba(99,102,241,0.08);
        }
        .favorite-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .favorite-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary, #fff);
            text-decoration: none;
            transition: color 0.2s;
        }
        .favorite-title:hover {
            color: var(--accent, #6366f1);
        }
        .favorite-cui {
            font-size: 0.8rem;
            color: var(--text-muted, #94a3b8);
            background: rgba(99,102,241,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-weight: 500;
        }
        .note-section {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .note-section label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary, #fff);
        }
        .note-textarea {
            width: 100%;
            min-height: 70px;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 0.75rem;
            background: var(--bg-primary, #0f1117);
            color: var(--text-primary, #fff);
            transition: border-color 0.3s;
        }
        .note-textarea:focus {
            outline: none;
            border-color: rgba(99,102,241,0.5);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .action-btns {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            align-items: center;
        }
        .btn-save {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(99,102,241,0.3);
            transition: all 0.25s ease;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(99,102,241,0.5);
        }
        .btn-save:active { transform: translateY(0); }
        .btn-delete {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239,68,68,0.1);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.2);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-delete:hover {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.4);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted, #94a3b8);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-building"></i> FirmeRO
            </a>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Căutare</a>
                <a href="harta.html" class="nav-link">Hartă</a>
                <a href="comparare.html" class="nav-link">Comparare</a>
                <a href="statistici.html" class="nav-link">Statistici</a>
                <div class="auth-links" style="display: flex; gap: 1rem; align-items: center;"></div>
            </div>
        </div>
    </header>

    <main class="container" style="max-width: 800px; margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Firme Favorite</h1>
            <span id="favorites-count" style="background: var(--primary-color); color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500;">0 / 20</span>
        </div>

        <div id="favorites-list">
            <div style="text-align: center; padding: 2rem;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.querySelector('.mobile-menu-btn').addEventListener('click', () => {
            document.querySelector('.nav-links').classList.toggle('active');
        });

        if (!Auth.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        async function fetchFavorites() {
            try {
                const res = await fetch(`${API_BASE_URL}/favorites`, {
                    headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
                });
                if (!res.ok) {
                    if (res.status === 401 || res.status === 403) Auth.logout();
                    throw new Error('Eroare la încărcarea favoritelor');
                }
                const json = await res.json();
                renderFavorites(json.data);
            } catch (err) {
                document.getElementById('favorites-list').innerHTML = `<div class="empty-state" style="color:#dc2626">${err.message}</div>`;
            }
        }

        function renderFavorites(favorites) {
            document.getElementById('favorites-count').textContent = `${favorites.length} / 20`;
            const list = document.getElementById('favorites-list');
            
            if (favorites.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open fa-3x" style="margin-bottom: 1rem; color: #cbd5e1;"></i>
                        <p>Nu ai salvat nicio firmă la favorite.</p>
                        <a href="index.html" class="search-btn" style="display: inline-flex; margin-top: 1rem; text-decoration: none;">Caută Firme</a>
                    </div>
                `;
                return;
            }

            list.innerHTML = favorites.map(f => `
                <div class="favorite-card" id="fav-${f.id}">
                    <div class="favorite-header">
                        <div>
                            <a href="firma.html?cui=${f.cui}" class="favorite-title">${f.denumire || 'Firmă Necunoscută'}</a>
                            <div style="margin-top: 0.25rem;">
                                <span class="favorite-cui">CUI: ${f.cui}</span>
                                <span style="font-size: 0.75rem; color: #94a3b8; margin-left: 0.5rem;">Adăugată pe: ${new Date(f.created_at).toLocaleDateString('ro-RO')}</span>
                            </div>
                        </div>
                        <button onclick="deleteFavorite(${f.id}, '${f.cui}')" class="btn-delete" title="Șterge din favorite">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="note-section">
                        <label>📝 Notițe personale:</label>
                        <textarea class="note-textarea" id="note-${f.id}" placeholder="Adaugă detalii, contacte, sau observații despre această firmă...">${f.notita || ''}</textarea>
                        <div class="action-btns">
                            <button onclick="saveNote(${f.id})" class="btn-save" id="save-btn-${f.id}">
                                💾 Salvează Notița
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function saveNote(id) {
            const notita = document.getElementById(`note-${id}`).value;
            const btn = document.getElementById(`save-btn-${id}`);
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '⏳ Se salvează...';
                btn.disabled = true;

                const res = await fetch(`${API_BASE_URL}/favorites/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${Auth.getToken()}`
                    },
                    body: JSON.stringify({ notita })
                });

                if (!res.ok) throw new Error('Eroare la salvare');
                
                btn.innerHTML = '✅ Salvat!';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                    btn.disabled = false;
                }, 2000);
            } catch (err) {
                alert(err.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function deleteFavorite(id, cui) {
            if (!confirm(`Ești sigur că vrei să ștergi firma cu CUI ${cui} din favorite?`)) return;
            
            try {
                const res = await fetch(`${API_BASE_URL}/favorites/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
                });

                if (!res.ok) throw new Error('Eroare la ștergere');
                
                document.getElementById(`fav-${id}`).remove();
                
                // Update count
                const countSpan = document.getElementById('favorites-count');
                let count = parseInt(countSpan.textContent.split('/')[0]);
                countSpan.textContent = `${count - 1} / 20`;
                
                if (count - 1 === 0) fetchFavorites(); // re-render empty state
            } catch (err) {
                alert(err.message);
            }
        }

        // Init
        fetchFavorites();
    </script>
</body>
</html>
