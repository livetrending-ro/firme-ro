<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartă Firme România — FirmeRO</title>
<meta name="description" content="Vizualizează firme din România pe hartă interactivă. Filtrează după județ, CAEN și statut.">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<style>
#map { height: calc(100vh - 180px); border-radius: var(--radius-lg); }
.map-sidebar { position:absolute;top:16px;left:16px;z-index:1000;width:280px; }
.leaflet-popup-content-wrapper { background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-md); }
.leaflet-popup-tip { background:var(--bg-secondary); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><div class="brand-icon">🏢</div>Firme<span class="brand-dot">RO</span></a>
    <nav class="navbar-nav">
      <a href="index.html">Acasă</a><a href="comparare.html">Comparare</a>
      <a href="harta.html" class="active">Hartă</a><a href="statistici.html">Statistici</a>
    </nav>
  </div>
</nav>

<div class="container-wide" style="padding:20px;position:relative">
  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <h2 style="flex:1;min-width:200px">🗺️ Hartă Firme România</h2>
    <input id="mapCuiInput" style="padding:9px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:Inter,sans-serif;width:200px" placeholder="CUI firmă..." onkeydown="if(event.key==='Enter')addToMap()">
    <button class="btn btn-primary btn-sm" onclick="addToMap()">📍 Plasează pe hartă</button>
  </div>
  <div style="position:relative">
    <div id="map"></div>
  </div>
  <p style="color:var(--text-muted);font-size:.8rem;margin-top:12px;text-align:center">
    Hartă powered by <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> &bull; Geocodare: Nominatim
  </p>
</div>

<script>window.FIRME_API_URL = 'https://firme-ro-api-production.up.railway.app';</script>
<script src="js/api.js"></script>
<script>
const map = L.map('map').setView([45.9432, 24.9668], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

const markers = {};

async function addToMap() {
  const cui = document.getElementById('mapCuiInput').value.trim().replace(/\D/g,'');
  if (!cui || cui.length < 4) return;
  document.getElementById('mapCuiInput').value = '';
  try {
    const d = await FirmeAPI.getDateGenerale(cui);
    if (!d.adresa) { alert('Adresa nu este disponibilă pentru această firmă.'); return; }
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(d.adresa+', Romania')}&limit=1`);
    const geo = await geoRes.json();
    if (!geo || !geo[0]) { alert('Nu s-a putut geocoda adresa.'); return; }
    const { lat, lon } = geo[0];
    const icon = L.divIcon({
      html: `<div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>`,
      iconSize: [32,32], iconAnchor: [16,32], className: ''
    });
    if (markers[cui]) map.removeLayer(markers[cui]);
    markers[cui] = L.marker([lat, lon], { icon }).addTo(map);
    markers[cui].bindPopup(`<div style="font-family:Inter,sans-serif">
      <div style="font-weight:700;font-size:.95rem;margin-bottom:4px">${d.denumire}</div>
      <div style="color:#94a3b8;font-size:.82rem">CUI ${d.cui}</div>
      <div style="color:#94a3b8;font-size:.82rem;margin-top:2px">${d.adresa}</div>
      <a href="firma.html?cui=${d.cui}" style="display:inline-block;margin-top:8px;color:#6366f1;font-size:.82rem;font-weight:600">📋 Vezi profil complet →</a>
    </div>`).openPopup();
    map.setView([lat, lon], 14);
  } catch (err) { alert('Eroare: '+err.message); }
}

// Load recent searches on map
const recent = JSON.parse(localStorage.getItem('firme_recent')||'[]').slice(0,5);
recent.forEach(r => {
  document.getElementById('mapCuiInput').value = r.cui;
  addToMap();
});
</script>
</body>
</html>
